<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Remonte</title>
<meta name="description" content="Run & bike rebuild — offline training log">
<meta name="theme-color" content="#070a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Remonte">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">
<link rel="stylesheet" href="./app.css">
</head>
<body>
<div id="app">
  <div id="banner-slot"></div>
  <section class="tab-page" data-page="today"></section>
  <section class="tab-page" data-page="week"></section>
  <section class="tab-page" data-page="progress"></section>
  <section class="tab-page" data-page="coach"></section>
  <section class="tab-page" data-page="settings"></section>
</div>

<button class="fab" id="fab" hidden aria-label="Log an activity">+</button>

<nav class="tabbar">
  <div class="inner">
    <button class="tab" data-tab="today" aria-label="Today">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"/><path d="M12 3v2.4M12 18.6V21M3 12h2.4M18.6 12H21M5.6 5.6l1.7 1.7M16.7 16.7l1.7 1.7M18.4 5.6l-1.7 1.7M7.3 16.7l-1.7 1.7"/></svg>Today
    </button>
    <button class="tab" data-tab="week" aria-label="Week">
      <span class="dot" id="weekdot" hidden></span>
      <svg viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="15.5" rx="3"/><path d="M3.5 10h17M8 3v4M16 3v4"/></svg>Week
    </button>
    <button class="tab" data-tab="progress" aria-label="Progress">
      <svg viewBox="0 0 24 24"><path d="M3 18.5l5.5-8 3.5 4.5 4-6.5 5 10z"/></svg>Progress
    </button>
    <button class="tab" data-tab="coach" aria-label="Coach">
      <span class="dot" id="coachdot" hidden></span>
      <svg viewBox="0 0 24 24"><path d="M12 3l8 4v5c0 4.5-3.2 7.3-8 9-4.8-1.7-8-4.5-8-9V7z"/><path d="M9 12l2 2 4-4"/></svg>Coach
    </button>
    <button class="tab" data-tab="settings" aria-label="Settings">
      <svg viewBox="0 0 24 24"><path d="M4 7.5h16M4 12h16M4 16.5h16"/><circle cx="9" cy="7.5" r="2" fill="#070a0f"/><circle cx="15" cy="12" r="2" fill="#070a0f"/><circle cx="7" cy="16.5" r="2" fill="#070a0f"/></svg>Settings
    </button>
  </div>
</nav>

<div id="overlay-root"></div>
<div id="toast" role="status"></div>

<noscript><p style="padding:24px">Remonte needs JavaScript — there is no server, everything runs on your phone.</p></noscript>
<script type="module" src="./app.js"></script>
</body>
</html>
